这是为您设计的“国家安全 青春挺膺”主题团日活动封面图HTML代码。它采用红色渐变背景，突出显示活动专题与25级软件技术3班团支部信息，适合用于活动宣传。

```html
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>国家安全 · 青春挺膺｜主题团日封面</title>
    <!-- Font Awesome 图标库 (v6 免费版) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #2b0f0c;  /* 深色底衬，突出红色封面 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', 'Segoe UI', '微软雅黑', 'Noto Sans SC', system-ui, sans-serif;
            padding: 16px;
        }

        /* 封面卡片 —— 模拟海报/封面图 */
        .poster {
            position: relative;
            width: 100%;
            max-width: 520px;      /* 适合手机竖屏比例，也可用于推文封面 */
            margin: 0 auto;
            background: radial-gradient(circle at 20% 10%, #e62e2e 0%, #b01010 70%, #7a0c0c 100%);
            border-radius: 48px 48px 48px 48px;
            box-shadow: 0 25px 40px -8px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 215, 0, 0.2) inset;
            overflow: hidden;
            transition: all 0.2s;
            border: 1px solid rgba(255, 220, 120, 0.4);
        }

        /* 红色背景增强层 + 纹理 */
        .poster::before {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                repeating-linear-gradient(45deg, rgba(255, 200, 0, 0.02) 0px, rgba(255, 200, 0, 0.02) 2px,
                transparent 2px, transparent 8px),
                radial-gradient(circle at 80% 90%, rgba(255, 215, 0, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        /* 巨型水印 “国安·挺膺” 增加层次 */
        .poster::after {
            content: "国家安全";
            position: absolute;
            bottom: 10%;
            right: -5%;
            font-size: 140px;
            font-weight: 900;
            color: rgba(255, 215, 0, 0.05);
            font-family: 'Impact', '黑体', sans-serif;
            white-space: nowrap;
            transform: rotate(-10deg);
            letter-spacing: 12px;
            pointer-events: none;
            z-index: 0;
            text-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        /* 第二个水印增加丰富度 */
        .watermark-two {
            position: absolute;
            top: 18%;
            left: -8%;
            font-size: 120px;
            font-weight: 900;
            color: rgba(255, 240, 150, 0.05);
            font-family: 'Impact', '黑体', sans-serif;
            transform: rotate(8deg);
            letter-spacing: 20px;
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }

        /* 所有主要内容在相对上层 */
        .content {
            position: relative;
            z-index: 5;
            padding: 28px 24px 32px;
            display: flex;
            flex-direction: column;
            color: white;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        /* 顶部装饰 — 教育日标识 */
        .top-flag {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .date-badge {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.6);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #FFE9A7;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .date-badge i {
            margin-right: 8px;
            color: #FFD966;
        }

        .tenth-badge {
            background: #FFD966;
            color: #9e1e1e;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #7a2e2e;
            border: 1px solid #fff3c9;
            text-shadow: none;
        }

        /* 五角星/盾牌图标行 */
        .icon-strip {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin: 10px 0 10px;
            font-size: 2.2rem;
            color: #FFD966;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.3));
        }

        /* 主标题区域 */
        .main-title {
            text-align: center;
            margin: 10px 0 6px;
        }

        .national {
            font-size: 4.2rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #FFFFFF;
            text-shadow: 4px 6px 0 #9e1a1a, 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 6px;
            word-break: keep-all;
        }

        .youth {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: 10px;
            color: #FFE9A7;
            text-shadow: 3px 4px 0 #ac1b1b, 0 8px 15px rgba(0,0,0,0.3);
            margin-top: -5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .youth i {
            font-size: 2.6rem;
            color: #FFD966;
            margin: 0 5px;
            filter: drop-shadow(0 2px 4px black);
        }

        /* 副标语 */
        .slogan {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
            padding: 10px 0;
            margin: 8px 0 12px;
            color: #FFF3CD;
            border-top: 1.5px dashed rgba(255, 215, 0, 0.6);
            border-bottom: 1.5px dashed rgba(255, 215, 0, 0.6);
        }

        .slogan i {
            margin: 0 10px;
            color: #FFD966;
        }

        /* 支部信息 — 突出参与方 */
        .branch-block {
            background: rgba(10, 5, 2, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 60px;
            padding: 18px 18px 14px;
            margin: 15px 0 10px;
            border: 1.5px solid #F9E076;
            box-shadow: 0 6px 0 #6d0e0e, 0 10px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        .branch-name {
            font-size: 2rem;
            font-weight: 800;
            color: #FFE9A7;
            letter-spacing: 3px;
            line-height: 1.2;
            text-shadow: 2px 3px 0 #941c1c;
            word-break: keep-all;
        }

        .branch-sub {
            font-size: 1.1rem;
            font-weight: 500;
            color: #fdd7a8;
            margin-top: 6px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .branch-sub i {
            font-size: 1rem;
            color: #FFD966;
        }

        /* 底部信息栏 */
        .footer-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 20px;
            color: #FFE3B0;
            font-weight: 600;
            text-shadow: 0 2px 5px black;
        }

        .theme-label {
            background: #ac1b1b;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1rem;
            border: 1px solid #f1c232;
            box-shadow: inset 0 1px 4px rgba(255,255,200,0.6);
            backdrop-filter: blur(4px);
        }

        .year-mark {
            font-size: 1.3rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .year-mark i {
            font-size: 1.2rem;
            color: #FFD966;
        }

        /* 装饰性长城垛口/线条 (纯css) */
        .decor-line {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 8px 0 2px;
        }

        .decor-line span {
            width: 40px;
            height: 5px;
            background: #FFD966;
            border-radius: 10px;
            box-shadow: 0 2px 3px black;
        }

        /* 盾牌内嵌小元素 */
        .shield-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 6px;
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .poster {
                border-radius: 36px;
                max-width: 440px;
            }
            .content {
                padding: 20px 18px 24px;
            }
            .national {
                font-size: 3.4rem;
                letter-spacing: 3px;
            }
            .youth {
                font-size: 2.8rem;
                letter-spacing: 6px;
            }
            .branch-name {
                font-size: 1.6rem;
            }
            .date-badge {
                font-size: 0.9rem;
                padding: 6px 14px;
            }
        }

        @media (max-width: 380px) {
            .national {
                font-size: 2.8rem;
            }
            .youth {
                font-size: 2.4rem;
            }
            .branch-name {
                font-size: 1.4rem;
            }
        }

        /* 让所有图标有层次 */
        .fa-star, .fa-shield-halved, .fa-lock, .fa-flag, .fa-dove {
            filter: drop-shadow(0 4px 4px #4a0404);
        }

        /* 添加一点动感，但保持静态封面效果 */
        .poster:hover {
            box-shadow: 0 28px 45px -6px black, 0 0 0 3px rgba(255, 215, 0, 0.3) inset;
            transition: 0.3s;
        }
    </style>
</head>
<body>
<div class="poster">
    <!-- 第二个水印文字 “青春挺膺” 增加设计感 -->
    <div class="watermark-two">青春挺膺</div>
    
    <div class="content">
        <!-- 顶部：国家安全教育日标识 -->
        <div class="top-flag">
            <div class="date-badge">
                <i class="fas fa-calendar-shield"></i> 4·15
            </div>
            <div class="tenth-badge">
                <i class="fas fa-flag-checkered"></i> 第十个 · 全民国家安全教育日
            </div>
        </div>

        <!-- 象征性图标：盾牌、星星、长城/锁 -->
        <div class="icon-strip">
            <i class="fas fa-shield-halved"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-lock"></i>
            <i class="fas fa-dove"></i>
        </div>

        <!-- 核心大标题 -->
        <div class="main-title">
            <div class="national">国家安全</div>
            <div class="youth">
                <i class="fas fa-angle-double-right" style="font-size: 2.2rem;"></i> 
                青春挺膺 
                <i class="fas fa-angle-double-left" style="font-size: 2.2rem;"></i>
            </div>
        </div>

        <!-- 装饰分割 -->
        <div class="decor-line">
            <span></span><span style="width: 60px;"></span><span></span>
        </div>

        <!-- 热血口号 -->
        <div class="slogan">
            <i class="fas fa-gem"></i> 以青春之我 · 护国安之基 <i class="fas fa-gem"></i>
        </div>

        <!-- 参与方 —— 25级软件技术3班团支部 突出显示 -->
        <div class="branch-block">
            <div class="branch-name">
                <i class="fas fa-users" style="font-size: 1.8rem; margin-right: 8px;"></i> 
                25级软件技术3班团支部
                <i class="fas fa-users" style="font-size: 1.8rem; margin-left: 8px;"></i>
            </div>
            <div class="branch-sub">
                <i class="fas fa-crown"></i> 主办 · 青春力量 <i class="fas fa-crown"></i>
            </div>
        </div>

        <!-- 底部：主题团日 + 年份 + 团徽风格装饰 -->
        <div class="footer-meta">
            <div class="theme-label">
                <i class="fas fa-flag"></i> 主题团日活动
            </div>
            <div class="year-mark">
                <i class="fas fa-circle" style="font-size: 10px;"></i> 
                2025 
                <i class="fas fa-circle" style="font-size: 10px;"></i>
            </div>
        </div>

        <!-- 最底部一行小元素：强调团支部与国家安全 -->
        <div class="shield-row">
            <i class="fas fa-shield-virus" style="color: #FFD966; font-size: 1.3rem;"></i>
            <span style="color: #FFDDAA; font-weight: 500; letter-spacing: 2px;">维护国家安全 · 青年勇毅担当</span>
            <i class="fas fa-shield-virus" style="color: #FFD966; font-size: 1.3rem;"></i>
        </div>

        <!-- 底部极简长城垛口意向 (视觉点缀) -->
        <div style="display: flex; justify-content: center; margin-top: 12px; gap: 5px;">
            <span style="width: 12px; height: 12px; background: #E6B422; transform: rotate(45deg); box-shadow: 0 2px 3px black;"></span>
            <span style="width: 12px; height: 12px; background: #E6B422; transform: rotate(45deg); box-shadow: 0 2px 3px black;"></span>
            <span style="width: 12px; height: 12px; background: #E6B422; transform: rotate(45deg); box-shadow: 0 2px 3px black;"></span>
            <span style="width: 12px; height: 12px; background: #E6B422; transform: rotate(45deg); box-shadow: 0 2px 3px black;"></span>
        </div>
    </div>
    <!-- 右下角隐隐约约团徽风格五角星 (绝对定位) -->
    <div style="position: absolute; bottom: 15px; right: 15px; opacity: 0.25; z-index: 2; color: #FFD966; font-size: 40px; transform: rotate(15deg);">
        <i class="fas fa-star"></i>
    </div>
    <div style="position: absolute; top: 25px; left: 20px; opacity: 0.2; z-index: 2; color: #FFC857; font-size: 38px; transform: rotate(-10deg);">
        <i class="fas fa-shield"></i>
    </div>
</div>

<!-- 注：整体背景为红色渐变，所有文字与装饰都契合“国家安全 青春挺膺”，且明确展示“25级软件技术3班团支部” -->
</body>
</html>
```
